<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>研学成长报告 · 数龙官 · 林同学</title>
<style>
/* ========== 设计令牌 ========== */
:root{
  --ink:#231a16;
  --muted:#66584f;
  --light:#8a7a6f;
  --paper:#fffdf8;
  --page:#eee7dc;
  --wash:#f7f1e7;
  --line:#ded3c2;
  --line-dark:#c9b9a3;
  --red:#8c211d;
  --red-dark:#611411;
  --blue:#176987;
  --green:#286b54;
  --gold:#b88738;

  --radius:8px;
  --radius-frame:24px;
  --shadow-frame:0 24px 60px rgba(35,26,22,.14);

  --frame-w:1640px;
  --frame-h:2016px;
  --frame-gap:48px;
  --stage-left:calc(var(--frame-w) / 3);
  --stage-right:48px;

  --fs-title:96px;
  --fs-body:64px;
  --fs-hint:36px;
  --fs-kpi:96px;
  --fs-badge:36px;
  --fs-kicker:64px;
  --fs-icon:64px;
  --fs-card-title:64px;
  --fs-stamp:64px;
  --fs-radar-dim:64px;
  --fs-radar-score:64px;

  --font-display:"Songti SC","Noto Serif SC",serif;
  --font-body:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
}

/* ========== 全局重置 ========== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:20px;}
body{
  background:var(--page);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:var(--fs-body);
  line-height:1.45;
  -webkit-font-smoothing:antialiased;
}

/* ========== 舞台 ========== */
.stage{
  display:flex;
  justify-content:flex-start;
  gap:var(--frame-gap);
  padding:72px var(--stage-right) 72px var(--stage-left);
  width:max-content;
  min-height:2160px;
  align-items:center;
}

/* ========== 帧 ========== */
.frame{
  width:var(--frame-w);
  height:var(--frame-h);
  flex-shrink:0;
  background:var(--paper);
  border-radius:var(--radius-frame);
  border:1px solid var(--line-dark);
  box-shadow:var(--shadow-frame);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  padding:56px 64px 48px;
}

/* ========== 页眉 ========== */
.frame-header{
  display:flex;
  justify-content:flex-start;
  align-items:center;
  gap:20px;
  padding-bottom:20px;
  border-bottom:3px double var(--line-dark);
  margin-bottom:24px;
  flex-shrink:0;
}
.frame-header .kicker{
  font-size:var(--fs-kicker);
  font-weight:900;
  color:var(--red);
  letter-spacing:.2em;
}
.achievement-frame .frame-header .kicker{letter-spacing:.08em;}
.frame-header .header-logo{
  width:84px;
  height:84px;
  color:var(--red);
  flex:0 0 84px;
}
.ui-icon{
  width:100%;
  height:100%;
  display:block;
  fill:none;
  stroke:currentColor;
  stroke-width:1.9;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.flow-loc .pin-icon{
  width:34px;
  height:34px;
  color:var(--red);
  flex:0 0 34px;
}
.report-figure figcaption .caption-icon{
  width:56px;
  height:56px;
  color:var(--red);
  flex:0 0 56px;
}

/* ========== 标题 ========== */
.frame-title{
  font-family:var(--font-display);
  font-size:var(--fs-title);
  font-weight:900;
  line-height:1.15;
  color:var(--ink);
  margin-bottom:28px;
  flex-shrink:0;
}
.student-named{color:var(--red);}

/* ========== 主角区 ========== */
.hero{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
}

/* ========== Badge ========== */
.badge{
  display:inline-flex;
  align-items:center;
  height:64px;
  padding:0 18px;
  border:1px solid var(--line-dark);
  border-radius:var(--radius);
  font-size:var(--fs-badge);
  line-height:1;
  font-weight:700;
  color:var(--ink);
  background:var(--paper);
  white-space:nowrap;
}
.badge.red{border-color:var(--red);color:var(--red);}
.badge.green{border-color:var(--green);color:var(--green);}

/* ========== 印章 ========== */
.stamp{
  width:80px;
  height:80px;
  border:1.5px solid var(--red);
  border-radius:var(--radius);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-family:var(--font-display);
  font-size:var(--fs-stamp);
  line-height:1;
  font-weight:900;
  color:var(--red);
  background:var(--paper);
  flex-shrink:0;
}

/* ========== 进度条 ========== */
.bar{
  height:18px;
  background:#e5d9c8;
  border-radius:999px;
  overflow:hidden;
}
.bar i{
  display:block;
  height:100%;
  background:var(--red);
  border-radius:999px;
}

/* ========== 流程步骤 ========== */
.flow-track{
  display:flex;
  align-items:stretch;
  gap:0;
  background:transparent;
  padding:56px 0 0;
  position:relative;
}
.flow-step{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
  min-width:0;
}
.flow-num{
  position:absolute;
  top:-50px;
  left:50%;
  transform:translateX(-50%);
  width:72px;
  height:72px;
  border-radius:50%;
  background:var(--red);
  color:#fff;
  font-size:var(--fs-body);
  line-height:1;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:3;
}
.flow-card{
  background:var(--paper);
  border:1px solid var(--line);
  border-right:0;
  border-radius:0;
  min-height:190px;
  padding:24px 6px 18px;
  text-align:center;
  width:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.flow-step:first-child .flow-card{border-radius:16px 0 0 16px;}
.flow-step:last-child .flow-card{border-right:1px solid var(--line);border-radius:0 16px 16px 0;}
.flow-loc{
  font-size:var(--fs-hint);
  color:var(--light);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.flow-name{
  font-size:var(--fs-body);
  line-height:1.15;
  font-weight:900;
  color:var(--ink);
  margin-top:14px;
  white-space:nowrap;
}
.flow-arrow{
  position:absolute;
  right:-105px;
  top:-17px;
  width:210px;
  border-top:3px dashed var(--red);
  z-index:2;
}
.flow-arrow::after{
  content:"";
  position:absolute;
  right:0;
  top:-8px;
  width:14px;
  height:14px;
  border-top:3px solid var(--red);
  border-right:3px solid var(--red);
  transform:rotate(45deg);
}

/* ========== 数据大卡 ========== */
.stat-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  align-items:stretch;
}
.stat-card{
  background:var(--wash);
  border:1px solid transparent;
  border-radius:16px;
  min-height:240px;
  padding:28px 34px;
  display:grid;
  grid-template-columns:156px 1fr;
  grid-template-areas:"icon label" "icon value";
  column-gap:26px;
  align-items:center;
  text-align:left;
}
.stat-card .icon{
  grid-area:icon;
  width:140px;
  height:140px;
  border:4px solid #d9b170;
  border-radius:50%;
  padding:18px;
  color:#b97820;
}
.stat-card:nth-child(2) .icon,
.stat-card:nth-child(3) .icon,
.stat-card:nth-child(4) .icon{border-color:transparent;padding:20px;}
.stat-card .ui-icon,
.team-icon .ui-icon,
.header-logo .ui-icon{stroke-width:2.4;}
.stat-card .label{
  grid-area:label;
  color:var(--muted);
  font-size:var(--fs-body);
  line-height:1.15;
  font-weight:800;
}
.stat-card .val{
  grid-area:value;
  font-size:var(--fs-kpi);
  font-weight:900;
  color:var(--ink);
  line-height:1.15;
}
.stat-card .val .u{
  font-size:var(--fs-body);
  font-weight:700;
}

/* ========== 团队迷你卡 ========== */
.team-row{
  display:flex;
  gap:20px;
}
.team-mini{
  flex:1;
  background:var(--wash);
  border:1px solid var(--line);
  border-radius:16px;
  min-height:230px;
  padding:28px 26px;
  display:grid;
  grid-template-columns:124px 1fr;
  grid-template-areas:"icon label" "icon value";
  column-gap:20px;
  align-items:center;
  text-align:left;
}
.team-mini .team-icon{
  grid-area:icon;
  width:116px;
  height:116px;
  color:#b97820;
}
.team-mini .tk{
  grid-area:label;
  font-size:var(--fs-body);
  line-height:1.2;
  font-weight:800;
  color:var(--muted);
  margin-bottom:8px;
}
.team-mini .tv{
  grid-area:value;
  font-family:var(--font-display);
  font-size:var(--fs-kpi);
  font-weight:900;
  line-height:1;
}

/* ========== 小组任务完成状态 ========== */
.role-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
  margin-bottom:28px;
}
.role-card{
  min-width:0;
  min-height:180px;
  background:var(--wash);
  border:1px solid var(--line-dark);
  border-top:5px solid var(--red);
  border-radius:var(--radius);
  padding:16px 4px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.role-check{
  width:54px;
  height:54px;
  border-radius:50%;
  background:var(--red);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.role-check svg{width:32px;height:32px;display:block;}
.role-name{
  font-size:var(--fs-body);
  line-height:1.1;
  font-weight:900;
  color:var(--ink);
  margin-top:12px;
  white-space:nowrap;
}

/* P2 · 新版横向推演图：把图片的多余纵向留白让给上方信息区 */
#p2 .role-grid{
  gap:14px;
  padding:18px;
  margin-bottom:38px;
  background:var(--wash);
  border-radius:16px;
}
#p2 .role-card{
  min-height:196px;
  padding:20px 6px;
  background:var(--paper);
  border:0;
  border-top:5px solid var(--red);
  border-radius:12px;
}
#p2 .role-name{margin-top:16px;}
#p2 .team-row{
  gap:24px;
  margin-bottom:40px !important;
}
#p2 .team-mini{
  min-height:252px;
  padding:32px 30px;
  border:0;
}
#p2 .report-figure figcaption{margin-bottom:24px;}
/* ========== 报告图片 ========== */
.report-figure{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
}
.report-figure figcaption{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:var(--fs-body);
  line-height:1.3;
  font-weight:900;
  color:var(--ink);
  margin-bottom:16px;
  flex-shrink:0;
}
.report-media{
  flex:1;
  min-height:0;
  background:#fffdf3;
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}
.report-media img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}
.tree-figure .report-media{padding:20px;}

/* ========== P3 · 跨学科学习与素养 ========== */
.learning-layout{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-rows:minmax(0,1fr) auto;
  gap:24px;
}
#p3 .tree-figure .report-media{padding:0;}
#p3 .tree-figure .report-media img{
  object-fit:fill;
}
.literacy-card{
  flex-shrink:0;
  background:var(--ink);
  color:var(--paper);
  border-radius:16px;
  padding:28px 34px 30px;
}
.literacy-card-head{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:24px;
  margin-bottom:20px;
}
.literacy-card-title{
  font-family:var(--font-display);
  font-size:72px;
  line-height:1.1;
  font-weight:900;
}
.literacy-card-note{
  font-size:var(--fs-hint);
  line-height:1.2;
  color:#d7b0a0;
  font-weight:800;
}
.literacy-tags{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.literacy-tags .badge{
  height:56px;
  border-color:rgba(255,255,255,.42);
  color:var(--paper);
  background:transparent;
  font-size:36px;
}
.literacy-tags .badge.primary{
  border-color:#d9b170;
  color:#f1d39f;
}
.literacy-tags .badge.cross{
  border-color:#7dbda5;
  color:#a9ddca;
}

/* ========== 五维卡 ========== */
.suzhi-layout{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-rows:auto minmax(0,1fr) auto;
  gap:16px;
}
.suzhi-card{
  background:var(--paper);
  border:1px solid var(--line);
  border-left:6px solid var(--red);
  border-radius:var(--radius);
  padding:24px 28px;
}
.suzhi-card .sc-head{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:14px;
}
.dimension-logo{
  width:80px;
  height:80px;
  padding:17px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  flex:0 0 80px;
  color:var(--red);
  background:var(--wash);
  border:1px solid var(--line);
  border-radius:20px;
}
.dimension-logo .ui-icon{stroke-width:1.8;}
.suzhi-card .sc-title{
  font-size:var(--fs-card-title);
  line-height:1.1;
  font-weight:900;
}
.suzhi-card .badge{
  height:64px;
  padding:0 16px;
  font-size:var(--fs-badge);
}
.suzhi-card .sc-body{
  font-size:var(--fs-body);
  line-height:1.3;
  color:var(--ink);
  margin-top:16px;
}
.suzhi-grid-top{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}
.suzhi-grid-top .suzhi-card{min-height:450px;}
.sc-tags{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.sc-metrics{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
  margin-top:18px;
}
.sc-metric-head{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:8px;
  margin-bottom:10px;
}
.sc-metric-label{
  font-size:var(--fs-hint);
  color:var(--muted);
  white-space:nowrap;
}
.sc-metric-value{
  font-size:var(--fs-body);
  line-height:1;
  font-weight:900;
  color:var(--red);
}
.health-metrics{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:14px;
}
.health-metric{
  min-width:0;
  display:flex;
  align-items:baseline;
  gap:6px;
  flex-wrap:nowrap;
  white-space:nowrap;
}
.health-metric b{
  font-family:var(--font-display);
  font-size:72px;
  line-height:1;
  color:var(--red);
}
.health-metric span{
  font-size:var(--fs-hint);
  color:var(--muted);
  font-weight:700;
}
.suzhi-art-card{
  background:var(--paper);
  border:1px solid var(--line);
  border-left:6px solid var(--red);
  border-radius:var(--radius);
  padding:22px 28px 20px;
  display:flex;
  flex-direction:column;
  flex:1;
  min-height:0;
}
.suzhi-art-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
  margin-bottom:18px;
  flex-shrink:0;
}
.suzhi-art-head .sc-head{margin:0;}
.suzhi-art-kicker{
  font-size:var(--fs-hint);
  line-height:1.2;
  color:var(--red);
  font-weight:800;
  letter-spacing:.08em;
}
.suzhi-art-photo{
  border-radius:var(--radius);
  overflow:hidden;
  flex:1;
  min-height:0;
  background:var(--wash);
}
.suzhi-art-photo img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center 54%;
  display:block;
}
.suzhi-art-caption{
  padding-bottom:18px;
  flex-shrink:0;
}
.suzhi-art-caption .sc-body{margin-top:0;}
.suzhi-labor-card{
  min-height:270px;
  display:grid;
  grid-template-columns:400px 1fr;
  align-items:center;
  gap:32px;
  padding:24px 32px;
}
.suzhi-labor-card .sc-head{
  margin:0;
  padding-right:32px;
  border-right:1px solid var(--line);
}
.suzhi-labor-content{min-width:0;}
.suzhi-labor-content .sc-body{margin-top:14px;}

/* ========== 雷达图 ========== */
.radar-wrap{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:0;
}
.radar-hint{
  font-size:var(--fs-hint);
  color:var(--light);
  text-align:center;
  margin-top:24px;
}
.problem-score-card{
  flex-shrink:0;
  background:var(--red);
  color:#fff;
  border-radius:18px;
  padding:28px 38px 30px;
}
.problem-score-head{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:28px;
  padding-bottom:18px;
  border-bottom:1px solid rgba(255,255,255,.32);
}
.problem-score-title{
  font-family:var(--font-display);
  font-size:72px;
  line-height:1.15;
  font-weight:900;
}
.problem-score-value{
  display:flex;
  align-items:baseline;
  gap:10px;
  white-space:nowrap;
  font-size:var(--fs-body);
  font-weight:800;
}
.problem-score-value b{
  font-family:var(--font-display);
  font-size:96px;
  line-height:.9;
}
.problem-score-evidence{
  display:grid;
  gap:10px;
  padding-top:20px;
}
.problem-score-evidence p{
  font-size:var(--fs-body);
  line-height:1.4;
  color:rgba(255,255,255,.9);
}
.problem-score-evidence strong{
  color:#fff;
  font-weight:900;
}

/* ========== 雷达详情卡 ========== */
.radar-detail{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-rows:auto auto 1fr;
  gap:20px;
}
.rd-kpi-area{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.rd-kpis{
  display:grid;
  grid-template-columns:1.25fr 1fr 1fr;
  gap:20px;
}
.rd-kpi{
  min-height:310px;
  border:1px solid var(--line-dark);
  border-radius:18px;
  background:var(--paper);
  padding:32px 36px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
}
.rd-kpi-main{
  background:var(--red);
  color:#fff;
  border-color:var(--red);
  justify-content:space-between;
}
.rd-kpi-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
}
.rd-kpi-label{
  font-size:var(--fs-hint);
  line-height:1.2;
  font-weight:900;
  letter-spacing:.08em;
  color:var(--muted);
}
.rd-kpi-main .rd-kpi-label{color:rgba(255,255,255,.78);}
.rd-kpi-main .rd-dim{
  font-family:var(--font-display);
  font-size:var(--fs-body);
  line-height:1.1;
  font-weight:900;
  color:#fff;
  margin-top:14px;
}
.rd-kpi-value-row{
  display:flex;
  align-items:flex-end;
  gap:12px;
}
.rd-kpi-value{
  font-family:var(--font-display);
  font-size:138px;
  line-height:.9;
  font-weight:900;
  color:var(--ink);
}
.rd-kpi-main .rd-kpi-value{font-size:160px;color:#fff;}
.rd-kpi-scale{
  font-size:var(--fs-hint);
  line-height:1;
  color:var(--light);
  padding-bottom:14px;
}
.rd-kpi-main .rd-kpi-scale{color:rgba(255,255,255,.72);}
.rd-rating{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  height:58px;
  padding:0 20px;
  border:2px solid rgba(255,255,255,.68);
  border-radius:999px;
  font-size:var(--fs-hint);

function radarSVG(){
  const keys = Object.keys(D.radar);
  const vals = keys.map(k=>D.radar[k]);
  const cx=450, cy=450, R=250;
  const n=keys.length;
  const angle = (i)=> -Math.PI/2 + (2*Math.PI*i/n);

  const ringLevels = [100,80,60,40,20];
  const rings = ringLevels.map(lv=>{
    const r = R*lv/100;
    const pts = Array.from({length:n}).map((_,i)=>{
      const a=angle(i);
      return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;
    }).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="var(--line)" stroke-width="${lv===100?1.5:0.8}" stroke-dasharray="${lv===100?'none':'4 3'}"/>`;
  }).join('');

  const scaleLabels = [20,40,60,80].map(lv=>{
    const r = R*lv/100;
    return `<text x="${cx+12}" y="${cy-r+12}" font-size="36" fill="var(--light)" font-family="var(--font-body)" opacity="0.8">${lv}</text>`;
  }).join('');

  const axes = keys.map((_,i)=>{
    const a=angle(i);
    return `<line x1="${cx}" y1="${cy}" x2="${cx+R*Math.cos(a)}" y2="${cy+R*Math.sin(a)}" stroke="var(--line)" stroke-width="0.8"/>`;
  }).join('');

  const dataPts = vals.map((v,i)=>{
    const a=angle(i);
    const r=R*v/100;
    return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;
  });
  const dataPoly = `<polygon points="${dataPts.join(' ')}" fill="rgba(140,33,29,.10)" stroke="var(--red)" stroke-width="3"/>`;
  const dots = dataPts.map(p=>`<circle cx="${p.split(',')[0]}" cy="${p.split(',')[1]}" r="8" fill="var(--red)"/>`).join('');

  const labels = keys.map((k,i)=>{
    const a=angle(i);
    const lR=R+100;
    const x=cx+lR*Math.cos(a);
    const y=cy+lR*Math.sin(a);
    const v=vals[i];
    const labelY=y-28;
    const badgeY=y;
    return `<g class="radar-vertex" data-k="${k}">
      <text x="${x}" y="${labelY}" text-anchor="middle" font-size="64" fill="var(--muted)" font-family="var(--font-body)" font-weight="700">${k}</text>
      <rect x="${x-70}" y="${badgeY}" rx="39" ry="39" width="140" height="78" fill="var(--red)" opacity="0.92"/>
      <text x="${x}" y="${badgeY+59}" text-anchor="middle" font-size="64" fill="#fff" font-weight="900" font-family="var(--font-body)">${v}</text>
    </g>`;
  }).join('');

  return `<svg viewBox="0 0 900 900" style="width:100%;max-height:1100px;display:block;margin:0 auto;">
    ${rings}${scaleLabels}${axes}${dataPoly}${dots}${labels}
  </svg>`;
}

      <p><strong>团队任务：</strong>出色完成，已集齐信息，完整推演故宫水系结构。</p>
    </div>
  </section>
`);

// ============= P6 · 活动参与过程评价 · 详情 =============
const defaultRadarKey = '投入度';
frameShell(document.getElementById('p6'), '活动参与过程评价', '活动参与过程评价 · 详情', `
  <div class="dim-tabs" id="dimTabs">
    ${Object.keys(D.radar).map(k=>`<button type="button" class="dim-tab${k===defaultRadarKey?' active':''}" data-k="${k}" aria-pressed="${k===defaultRadarKey?'true':'false'}">${k}</button>`).join('')}
  </div>
  <div class="radar-detail" id="radarDetail"></div>
`);

// ============= 交互：P6 维度切换 =============
(function(){
  const $box = document.getElementById('radarDetail');
  const tabs = document.querySelectorAll('#dimTabs .dim-tab');
  let activeK = null;

  function showDim(k){
    if(activeK===k) return;
    activeK = k;
    const info = D.radarExplain[k];
    const v = D.radar[k];
    const diff = v - info.avg;
    const diffLabel = diff>0?'领先班均':(diff<0?'低于班均':'对比班均');
    const diffValue = diff>0?`+${diff}`:`${diff}`;
    tabs.forEach(t=>{
      const isActive = t.dataset.k===k;
      t.classList.toggle('active', isActive);
      t.setAttribute('aria-pressed', isActive?'true':'false');
    });
    $box.innerHTML = `
      <div class="rd-kpi-area">
        <div class="rd-kpis">
          <section class="rd-kpi rd-kpi-main">
            <div class="rd-kpi-top"><span class="rd-kpi-label">当前维度</span><span class="rd-rating">${info.rating}</span></div>
            <div class="rd-dim">${k}</div>
            <div class="rd-kpi-value-row"><strong class="rd-kpi-value">${v}</strong><span class="rd-kpi-scale">/ 100</span></div>
          </section>
          <section class="rd-kpi">
            <span class="rd-kpi-label">班级均分</span>
            <div class="rd-kpi-value-row"><strong class="rd-kpi-value">${info.avg}</strong></div>
            <span class="rd-kpi-note">本次班级平均表现</span>
          </section>
          <section class="rd-kpi${diff>=0?' positive':''}">
            <span class="rd-kpi-label">${diffLabel}</span>
            <div class="rd-kpi-value-row"><strong class="rd-kpi-value">${diffValue}</strong></div>
            <span class="rd-kpi-note">同维度横向比较</span>
          </section>
        </div>
        <div class="rd-def-mini"><strong>指标说明</strong><span>${info.def}</span></div>
      </div>
      <section class="rd-evidence count-${info.ref.length}">
        <div class="rd-section-head"><h3>过程证据</h3><span class="rd-section-kicker">${info.ref.length} 项有效证据</span></div>
        <ul>${info.ref.map((r,i)=>`<li><span class="rd-evidence-index">0${i+1}</span><span>${r}</span></li>`).join('')}</ul>
      </section>
      <section class="rd-conclusion">
        <div class="rd-section-head"><h3>评价结论</h3><span class="rd-section-kicker">AI 总结</span></div>
        <div class="rd-why">${info.why}</div>
      </section>
    `;
  }

  tabs.forEach(t=>t.addEventListener('click',()=>showDim(t.dataset.k)));
  showDim(defaultRadarKey);
})();
</script>

<script>
// 临时开关：明天关闭时改为 false，再运行 $deploy-stu-report。
const AUTO_REFRESH_AFTER_DEPLOY = true;
const AUTO_REFRESH_INTERVAL_MS = 3000;

if (AUTO_REFRESH_AFTER_DEPLOY && /^https?:$/.test(window.location.protocol)) {
  let currentDeployVersion = null;
  let deployCheckInFlight = false;

  function checkDeployVersion(){
    if(deployCheckInFlight) return;
    deployCheckInFlight = true;

    const probe = document.createElement('script');
    probe.async = true;
    probe.src = `public/deploy-version.js?_=${Date.now()}`;
    probe.onload = ()=>{
      const nextVersion = window.__STU_REPORT_LATEST_VERSION__;
      probe.remove();
      deployCheckInFlight = false;
      if(!nextVersion) return;
      if(currentDeployVersion === null){
        currentDeployVersion = nextVersion;
        return;
      }
      if(nextVersion !== currentDeployVersion){
        const refreshURL = new URL(window.location.href);
        refreshURL.searchParams.set('deploy', nextVersion);
        window.location.replace(refreshURL.toString());
      }
    };
    probe.onerror = ()=>{
      probe.remove();
      deployCheckInFlight = false;
    };
    document.head.appendChild(probe);
  }

  checkDeployVersion();
  window.setInterval(checkDeployVersion, AUTO_REFRESH_INTERVAL_MS);
}
</script>
