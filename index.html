<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>研学成长报告 · 数龙官 · 林同学</title>
<style>
/* ========== 设计令牌 ========== */
:root{
  --ink:#231a16;
  --muted:#66584f;
  --light:#8a7a6f;
  --paper:#fffdf8;
  --page:#eee7dc;
  --wash:#f7f1e7;
  --line:#ded3c2;
  --line-dark:#c9b9a3;
  --red:#8c211d;
  --red-dark:#611411;
  --blue:#176987;
  --green:#286b54;
  --gold:#b88738;

  --radius:8px;
  --radius-frame:24px;
  --shadow-frame:0 24px 60px rgba(35,26,22,.14);

  --frame-w:1552px;
  --frame-h:2016px;

  --fs-title:96px;
  --fs-body:64px;
  --fs-hint:36px;
  --fs-kpi:96px;
  --fs-badge:36px;
  --fs-kicker:64px;
  --fs-icon:64px;
  --fs-card-title:64px;
  --fs-stamp:64px;
  --fs-radar-dim:64px;
  --fs-radar-score:64px;

  --font-display:"Songti SC","Noto Serif SC",serif;
  --font-body:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
}

/* ========== 全局重置 ========== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:20px;}
body{
  background:var(--page);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:var(--fs-body);
  line-height:1.45;
  -webkit-font-smoothing:antialiased;
}

/* ========== 舞台 ========== */
.stage{
  display:flex;
  justify-content:space-between;
  gap:0;
  padding:72px 48px;
  width:9984px;
  min-height:2160px;
  align-items:center;
}

/* ========== 帧 ========== */
.frame{
  width:var(--frame-w);
  height:var(--frame-h);
  flex-shrink:0;
  background:var(--paper);
  border-radius:var(--radius-frame);
  border:1px solid var(--line-dark);
  box-shadow:var(--shadow-frame);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  padding:56px 64px 48px;
}

/* ========== 页眉 ========== */
.frame-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding-bottom:20px;
  border-bottom:3px double var(--line-dark);
  margin-bottom:24px;
  flex-shrink:0;
}
.frame-header .kicker{
  font-size:var(--fs-kicker);
  font-weight:900;
  color:var(--red);
  letter-spacing:.2em;
}

/* ========== 标题 ========== */
.frame-title{
  font-family:var(--font-display);
  font-size:var(--fs-title);
  font-weight:900;
  line-height:1.15;
  color:var(--ink);
  margin-bottom:28px;
  flex-shrink:0;
}

/* ========== 主角区 ========== */
.hero{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
}

/* ========== Badge ========== */
.badge{
  display:inline-flex;
  align-items:center;
  height:64px;
  padding:0 18px;
  border:1px solid var(--line-dark);
  border-radius:var(--radius);
  font-size:var(--fs-badge);
  line-height:1;
  font-weight:700;
  color:var(--ink);
  background:var(--paper);
  white-space:nowrap;
}
.badge.red{border-color:var(--red);color:var(--red);}
.badge.green{border-color:var(--green);color:var(--green);}

/* ========== 印章 ========== */
.stamp{
  width:80px;
  height:80px;
  border:1.5px solid var(--red);
  border-radius:var(--radius);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-family:var(--font-display);
  font-size:var(--fs-stamp);
  line-height:1;
  font-weight:900;
  color:var(--red);
  background:var(--paper);
  flex-shrink:0;
}

/* ========== 进度条 ========== */
.bar{
  height:18px;
  background:#e5d9c8;
  border-radius:999px;
  overflow:hidden;
}
.bar i{
  display:block;
  height:100%;
  background:var(--red);
  border-radius:999px;
}

/* ========== 流程步骤 ========== */
.flow-track{
  display:flex;
  align-items:stretch;
  gap:0;
  background:var(--wash);
  border-radius:16px;
  padding:24px 12px;
  position:relative;
}
.flow-step{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  position:relative;
}
.flow-num{
  width:76px;
  height:76px;
  border-radius:50%;
  background:var(--red);
  color:#fff;
  font-size:var(--fs-body);
  line-height:1;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
}
.flow-card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px 6px;
  text-align:center;
  width:100%;
}
.flow-loc{
  font-size:var(--fs-hint);
  color:var(--light);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.flow-name{
  font-size:var(--fs-body);
  line-height:1.15;
  font-weight:900;
  color:var(--ink);
  margin-top:10px;
}
.flow-arrow{
  position:absolute;
  right:-24px;
  top:34px;
  color:var(--red);
  font-size:var(--fs-body);
  z-index:1;
}

/* ========== 数据大卡 ========== */
.stat-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  align-items:stretch;
}
.stat-card{
  background:var(--page);
  border-radius:12px;
  min-height:210px;
  padding:22px 28px;
  display:grid;
  grid-template-columns:80px 1fr;
  grid-template-areas:"icon label" "icon value";
  column-gap:20px;
  align-items:center;
  text-align:left;
}
.stat-card .icon{grid-area:icon;font-size:var(--fs-icon);line-height:1;}
.stat-card .label{
  grid-area:label;
  color:var(--muted);
  font-size:var(--fs-body);
  line-height:1.15;
  font-weight:800;
}
.stat-card .val{
  grid-area:value;
  font-size:var(--fs-kpi);
  font-weight:900;
  color:var(--ink);
  line-height:1.15;
}
.stat-card .val .u{
  font-size:var(--fs-body);
  font-weight:700;
}

/* ========== 团队迷你卡 ========== */
.team-row{
  display:flex;
  gap:20px;
}
.team-mini{
  flex:1;
  background:var(--wash);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:24px;
  text-align:center;
}
.team-mini .tk{
  font-size:var(--fs-body);
  line-height:1.2;
  font-weight:800;
  color:var(--muted);
  margin-bottom:8px;
}
.team-mini .tv{
  font-family:var(--font-display);
  font-size:var(--fs-kpi);
  font-weight:900;
  line-height:1;
}

/* ========== 小组任务完成状态 ========== */
.role-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:14px;
  margin-bottom:32px;
}
.role-card{
  min-width:0;
  min-height:188px;
  background:var(--wash);
  border:1px solid var(--line-dark);
  border-top:6px solid var(--red);
  border-radius:var(--radius);
  padding:18px 6px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.role-check{
  width:58px;
  height:58px;
  border-radius:50%;
  background:var(--red);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.role-check svg{width:34px;height:34px;display:block;}
.role-name{
  font-size:var(--fs-body);
  line-height:1.1;
  font-weight:900;
  color:var(--ink);
  margin-top:12px;
  white-space:nowrap;
}
/* ========== 报告图片 ========== */
.report-figure{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
}
.report-figure figcaption{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:var(--fs-body);
  line-height:1.3;
  font-weight:900;
  color:var(--ink);
  margin-bottom:16px;
  flex-shrink:0;
}
.report-media{
  flex:1;
  min-height:0;
  background:#fffdf3;
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}
.report-media img{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}
.tree-figure .report-media{padding:20px;}

/* ========== 五维卡 ========== */
.suzhi-layout{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-rows:auto minmax(0,1fr) auto;
  gap:16px;
}
.suzhi-card{
  background:var(--paper);
  border:1px solid var(--line);
  border-left:6px solid var(--red);
  border-radius:var(--radius);
  padding:24px 28px;
}
.suzhi-card .sc-head{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:14px;
}
.suzhi-card .sc-title{
  font-size:var(--fs-card-title);
  line-height:1.1;
  font-weight:900;
}
.suzhi-card .badge{
  height:64px;
  padding:0 16px;
  font-size:var(--fs-badge);
}
.suzhi-card .sc-body{
  font-size:var(--fs-body);
  line-height:1.3;
  color:var(--ink);
  margin-top:16px;
}
.suzhi-grid-top{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}
.suzhi-grid-top .suzhi-card{min-height:450px;}
.sc-tags{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.sc-metrics{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  margin-top:14px;
}
.sc-metric-head{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:8px;
  margin-bottom:10px;
}
.sc-metric-label{font-size:var(--fs-hint);color:var(--muted);}
.sc-metric-value{
  font-size:var(--fs-body);
  line-height:1;
  font-weight:900;
  color:var(--red);
}
.health-stat{
  display:flex;
  align-items:baseline;
  gap:12px;
  flex-wrap:wrap;
  margin-top:20px;
}
.health-stat b{
  font-family:var(--font-display);
  font-size:72px;
  line-height:1;
  color:var(--red);
}
.health-stat span{
  font-size:var(--fs-body);
  color:var(--muted);
  font-weight:700;
}
.suzhi-art-card{
  background:var(--paper);
  border:1px solid var(--line);
  border-left:6px solid var(--red);
  border-radius:var(--radius);
  padding:22px 28px 20px;
  display:flex;
  flex-direction:column;
  flex:1;
  min-height:0;
}
.suzhi-art-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
  margin-bottom:18px;
  flex-shrink:0;
}
.suzhi-art-head .sc-head{margin:0;}
.suzhi-art-kicker{
  font-size:var(--fs-hint);
  line-height:1.2;
  color:var(--red);
  font-weight:800;
  letter-spacing:.08em;
}
.suzhi-art-photo{
  border-radius:var(--radius);
  overflow:hidden;
  flex:1;
  min-height:0;
  background:var(--wash);
}
.suzhi-art-photo img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center 54%;
  display:block;
}
.suzhi-art-caption{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:24px;
  padding-top:18px;
  flex-shrink:0;
}
.suzhi-art-caption strong{
  font-size:var(--fs-body);
  line-height:1.2;
  color:var(--ink);
}
.suzhi-art-caption span{
  font-size:var(--fs-hint);
  line-height:1.4;
  color:var(--muted);
}
.suzhi-labor-card{
  min-height:270px;
  display:grid;
  grid-template-columns:400px 1fr;
  align-items:center;
  gap:32px;
  padding:24px 32px;
}
.suzhi-labor-card .sc-head{
  margin:0;
  padding-right:32px;
  border-right:1px solid var(--line);
}
.suzhi-labor-content{min-width:0;}
.suzhi-labor-content .sc-body{margin-top:14px;}

/* ========== 雷达图 ========== */
.radar-wrap{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:0;
}
.radar-hint{
  font-size:var(--fs-hint);
  color:var(--light);
  text-align:center;
  margin-top:24px;
}

/* ========== 雷达详情卡 ========== */
.radar-detail{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:40px 48px;
  flex:1;
  min-height:0;
  transition:all .25s;
}
.radar-detail.active{border-left:6px solid var(--red);}
.radar-detail .rd-head{
  display:flex;
  align-items:center;
  gap:24px;
  margin-bottom:28px;
}
.radar-detail .rd-dim{
  font-size:var(--fs-radar-dim);
  line-height:1.2;
  font-weight:900;
  color:var(--ink);
}
.radar-detail .rd-score{
  display:inline-flex;
  align-items:center;
  background:linear-gradient(135deg,var(--red),#b5342f);
  color:#fff;
  font-size:var(--fs-radar-score);
  line-height:1.2;
  font-weight:800;
  padding:8px 24px;
  border-radius:28px;
}
.radar-detail .rd-rating{
  font-size:var(--fs-hint);
  color:var(--red);
  font-weight:700;
  border:1.5px solid var(--red);
  padding:8px 18px;
  border-radius:16px;
}
.radar-detail .rd-def{
  font-size:var(--fs-body);
  color:var(--muted);
  line-height:1.35;
  margin-bottom:28px;
}
.radar-detail .rd-ref{margin-bottom:28px;}
.radar-detail .rd-ref-title{
  font-size:var(--fs-hint);
  color:var(--light);
  font-weight:700;
  margin-bottom:12px;
}
.radar-detail .rd-ref ul{
  list-style:none;
  padding:0;
  margin:0;
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}
.radar-detail .rd-ref li{
  font-size:var(--fs-hint);
  color:var(--muted);
  background:var(--wash);
  border:1px solid var(--line);
  padding:10px 18px;
  border-radius:16px;
}
.radar-detail .rd-avg{
  font-size:var(--fs-body);
  line-height:1.3;
  color:var(--light);
  margin-bottom:28px;
}
.radar-detail .rd-avg b{color:var(--ink);font-weight:800;}
.radar-detail .rd-why-title{
  font-size:var(--fs-body);
  color:var(--red);
  font-weight:800;
  margin-bottom:10px;
}
.radar-detail .rd-why{
  font-size:var(--fs-body);
  line-height:1.4;
  color:var(--ink);
}

/* ========== 维度切换按钮 ========== */
.dim-tabs{
  display:flex;
  gap:12px;
  margin-top:24px;
  flex-shrink:0;
}
.dim-tab{
  flex:1;
  height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:var(--fs-body);
  font-weight:900;
  color:var(--muted);
  background:var(--wash);
  border:2px solid var(--line);
  border-radius:var(--radius);
  cursor:pointer;
  transition:all .2s;
}
.dim-tab.active{
  color:var(--red);
  border-color:var(--red);
  background:var(--paper);
}
.dim-tab:hover{color:var(--ink);}
</style>
</head>

<script>

// ============= P5 · 活动参与过程评价（雷达图） =============
function radarSVG(){
  const keys = Object.keys(D.radar);
  const vals = keys.map(k=>D.radar[k]);
  const cx=450, cy=450, R=250;
  const n=keys.length;
  const angle = (i)=> -Math.PI/2 + (2*Math.PI*i/n);

  const ringLevels = [100,80,60,40,20];
  const rings = ringLevels.map(lv=>{
    const r = R*lv/100;
    const pts = Array.from({length:n}).map((_,i)=>{
      const a=angle(i);
      return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;
    }).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="var(--line)" stroke-width="${lv===100?1.5:0.8}" stroke-dasharray="${lv===100?'none':'4 3'}"/>`;
  }).join('');

  const scaleLabels = [20,40,60,80].map(lv=>{
    const r = R*lv/100;
    return `<text x="${cx+12}" y="${cy-r+12}" font-size="36" fill="var(--light)" font-family="var(--font-body)" opacity="0.8">${lv}</text>`;
  }).join('');

  const axes = keys.map((_,i)=>{
    const a=angle(i);
    return `<line x1="${cx}" y1="${cy}" x2="${cx+R*Math.cos(a)}" y2="${cy+R*Math.sin(a)}" stroke="var(--line)" stroke-width="0.8"/>`;
  }).join('');

  const dataPts = vals.map((v,i)=>{
    const a=angle(i);
    const r=R*v/100;
    return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;
  });
  const dataPoly = `<polygon points="${dataPts.join(' ')}" fill="rgba(140,33,29,.10)" stroke="var(--red)" stroke-width="3"/>`;
  const dots = dataPts.map(p=>`<circle cx="${p.split(',')[0]}" cy="${p.split(',')[1]}" r="8" fill="var(--red)"/>`).join('');

  const labels = keys.map((k,i)=>{
    const a=angle(i);
    const lR=R+100;
    const x=cx+lR*Math.cos(a);
    const y=cy+lR*Math.sin(a);
    const v=vals[i];
    const labelY=y-28;
    const badgeY=y;
    return `<g class="radar-vertex" data-k="${k}">
      <text x="${x}" y="${labelY}" text-anchor="middle" font-size="64" fill="var(--muted)" font-family="var(--font-body)" font-weight="700">${k}</text>
      <rect x="${x-70}" y="${badgeY}" rx="39" ry="39" width="140" height="78" fill="var(--red)" opacity="0.92"/>
      <text x="${x}" y="${badgeY+59}" text-anchor="middle" font-size="64" fill="#fff" font-weight="900" font-family="var(--font-body)">${v}</text>
    </g>`;
  }).join('');

  return `<svg viewBox="0 0 900 900" style="width:100%;max-height:1100px;display:block;margin:0 auto;">
    ${rings}${scaleLabels}${axes}${dataPoly}${dots}${labels}
  </svg>`;
}

`);

// ============= 交互：P6 维度切换 =============
(function(){
  const $box = document.getElementById('radarDetail');
  const tabs = document.querySelectorAll('#dimTabs .dim-tab');
  let activeK = null;

  function showDim(k){
    if(activeK===k) return;
    activeK = k;
    const info = D.radarExplain[k];
    const v = D.radar[k];
    const diff = v - info.avg;
    const diffStr = diff>0?`高于班均 ${diff} 分`:(diff<0?`低于班均 ${Math.abs(diff)} 分`:'与班均持平');
    tabs.forEach(t=>t.classList.toggle('active', t.dataset.k===k));
    $box.innerHTML = `
      <div class="rd-head">
        <span class="rd-dim">${k}</span>
        <span class="rd-score">${v}</span>
        <span class="rd-rating">${info.rating}</span>
      </div>
      <div class="rd-def">${info.def}</div>
      <div class="rd-ref">
        <div class="rd-ref-title">参考数据</div>
        <ul>${info.ref.map(r=>`<li>${r}</li>`).join('')}</ul>
      </div>
      <div class="rd-avg">班级均分 <b>${info.avg}</b>　${diffStr}</div>
      <div class="rd-why-title">AI 总结</div>
      <div class="rd-why">${info.why}</div>
    `;
  }

  tabs.forEach(t=>t.addEventListener('click',()=>showDim(t.dataset.k)));
  showDim(Object.keys(D.radar)[0]);
})();
</script>
