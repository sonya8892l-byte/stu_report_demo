<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>研学成长报告 · 数龙官 · 林同学</title>
<style>
/* ========== 设计令牌 ========== */
:root{
  --ink:#231a16;
  --muted:#66584f;
  --light:#8a7a6f;
  --paper:#fffdf8;
  --page:#eee7dc;
  --wash:#f7f1e7;
  --line:#ded3c2;
  --line-dark:#c9b9a3;
  --red:#8c211d;
  --red-dark:#611411;
  --blue:#176987;
  --green:#286b54;
  --gold:#b88738;

  --radius:8px;
  --radius-frame:24px;
  --shadow-frame:0 24px 60px rgba(35,26,22,.14);

  --frame-w:1552px;
  --frame-h:2016px;

  --fs-title:96px;
  --fs-body:32px;
  --fs-hint:26px;
  --fs-kpi:96px;
  --fs-badge:26px;
  --fs-kicker:28px;

  --font-display:"Songti SC","Noto Serif SC",serif;
  --font-body:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
}

/* ========== 全局重置 ========== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:20px;}
body{
  background:var(--page);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:var(--fs-body);
  line-height:1.8;
  -webkit-font-smoothing:antialiased;
}

/* ========== 舞台 ========== */
.stage{
  display:flex;
  gap:48px;
  padding:72px 48px;
  width:9984px;
  min-height:2160px;
  align-items:center;
}

/* ========== 帧 ========== */
.frame{
  width:var(--frame-w);
  height:var(--frame-h);
  flex-shrink:0;
  background:var(--paper);
  border-radius:var(--radius-frame);
  border:1px solid var(--line-dark);
  box-shadow:var(--shadow-frame);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  padding:56px 64px 48px;
}

/* ========== 页眉 ========== */
.frame-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding-bottom:20px;
  border-bottom:3px double var(--line-dark);
  margin-bottom:36px;
  flex-shrink:0;
}
.frame-header .kicker{
  font-size:var(--fs-kicker);
  font-weight:900;
  color:var(--red);
  letter-spacing:.2em;
}

/* ========== 标题 ========== */
.frame-title{
  font-family:var(--font-display);
  font-size:var(--fs-title);
  font-weight:900;
  line-height:1.15;
  color:var(--ink);
  margin-bottom:40px;
  flex-shrink:0;
}

/* ========== 主角区 ========== */
.hero{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
}

/* ========== 深色结论块 ========== */
.dark-block{
  background:var(--ink);
  color:var(--paper);
  border-radius:var(--radius);
  padding:32px 40px;
  flex-shrink:0;
}
.dark-block.red{background:var(--red-dark);}
.dark-block .block-label{
  font-size:var(--fs-hint);
  font-weight:900;
  letter-spacing:.1em;
  color:var(--wash);
  margin-bottom:8px;
}
.dark-block .block-body{
  font-size:var(--fs-body);
  line-height:1.8;
  color:var(--paper);
}
.dark-block .block-hint{
  font-size:var(--fs-hint);
  color:var(--line);
  margin-top:8px;
  line-height:1.5;
}

/* ========== Badge ========== */
.badge{
  display:inline-flex;
  align-items:center;
  height:40px;
  padding:0 16px;
  border:1px solid var(--line-dark);
  border-radius:var(--radius);
  font-size:var(--fs-badge);
  font-weight:700;
  color:var(--ink);
  background:var(--paper);
  white-space:nowrap;
}
.badge.red{border-color:var(--red);color:var(--red);}
.badge.green{border-color:var(--green);color:var(--green);}

/* ========== 印章 ========== */
.stamp{
  width:56px;
  height:56px;
  border:1.5px solid var(--red);
  border-radius:var(--radius);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-family:var(--font-display);
  font-size:36px;
  font-weight:900;
  color:var(--red);
  background:var(--paper);
  flex-shrink:0;
}

/* ========== 进度条 ========== */
.bar{
  height:18px;
  background:#e5d9c8;
  border-radius:999px;
  overflow:hidden;
}
.bar i{
  display:block;
  height:100%;
  background:var(--red);
  border-radius:999px;
}

/* ========== 地图容器 ========== */
.map-box{
  background:#fffdf3;
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
}
.map-box svg{
  display:block;
  width:100%;
  height:100%;
}

/* ========== 流程步骤 ========== */
.flow-track{
  display:flex;
  align-items:stretch;
  gap:0;
  background:var(--wash);
  border-radius:16px;
  padding:32px 16px;
  position:relative;
}
.flow-step{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  position:relative;
}
.flow-num{
  width:56px;
  height:56px;
  border-radius:50%;
  background:var(--red);
  color:#fff;
  font-size:var(--fs-body);
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
}
.flow-card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:12px;
  padding:16px 12px;
  text-align:center;
  width:100%;
}
.flow-loc{
  font-size:var(--fs-hint);
  color:var(--light);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.flow-name{
  font-size:var(--fs-body);
  font-weight:900;
  color:var(--ink);
  margin-top:6px;
}
.flow-arrow{
  position:absolute;
  right:-16px;
  top:28px;
  color:var(--red);
  font-size:var(--fs-body);
  z-index:1;
}

/* ========== 数据大卡 ========== */
.stat-grid{
  display:flex;
  gap:16px;
  align-items:stretch;
}
.stat-card{
  flex:1;
  background:var(--page);
  border-radius:12px;
  padding:28px 20px;
  text-align:center;
}
.stat-card .icon{font-size:40px;margin-bottom:10px;}
.stat-card .label{
  color:var(--muted);
  font-size:var(--fs-hint);
  margin-bottom:8px;
}
.stat-card .val{
  font-size:72px;
  font-weight:900;
  color:var(--ink);
  line-height:1;
}
.stat-card .val .u{
  font-size:var(--fs-hint);
  font-weight:400;
}

/* ========== 团队迷你卡 ========== */
.team-row{
  display:flex;
  gap:20px;
}
.team-mini{
  flex:1;
  background:var(--wash);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:24px;
  text-align:center;
}
.team-mini .tk{
  font-size:var(--fs-hint);
  color:var(--muted);
  margin-bottom:8px;
}
.team-mini .tv{
  font-family:var(--font-display);
  font-size:var(--fs-kpi);
  font-weight:900;
  line-height:1;
}

/* ========== 五维卡 ========== */
.suzhi-card{
  background:var(--paper);
  border:1px solid var(--line);
  border-left:6px solid var(--red);
  border-radius:var(--radius);
  padding:28px 32px;
}
.suzhi-card .sc-head{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:12px;
}
.suzhi-card .sc-title{
  font-size:40px;
  font-weight:900;
}
.suzhi-card .sc-body{
  font-size:var(--fs-body);
  line-height:1.8;
  color:var(--ink);
  margin-top:12px;
}
.suzhi-grid-top{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}
.suzhi-grid-bottom{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  flex:1;
  min-height:0;
}
.suzhi-photo{
  border-radius:var(--radius);
  overflow:hidden;
  flex:1;
  min-height:480px;
}
.suzhi-photo img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* ========== 雷达图 ========== */
.radar-wrap{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:0;
}
.radar-hint{
  font-size:var(--fs-hint);
  color:var(--light);
  text-align:center;
  margin-top:24px;
}

/* ========== 雷达详情卡 ========== */
.radar-detail{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:36px 40px;
  flex:1;
  min-height:0;
  transition:all .25s;
}
.radar-detail.active{border-left:6px solid var(--red);}
.radar-detail .rd-head{
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:20px;
}
.radar-detail .rd-dim{
  font-size:36px;
  font-weight:900;
  color:var(--ink);
}
.radar-detail .rd-score{
  display:inline-flex;
  align-items:center;
  background:linear-gradient(135deg,var(--red),#b5342f);
  color:#fff;
  font-size:28px;
  font-weight:800;
  padding:6px 18px;
  border-radius:20px;
}
.radar-detail .rd-rating{
  font-size:var(--fs-hint);
  color:var(--red);
  font-weight:700;
  border:1.5px solid var(--red);
  padding:4px 14px;
  border-radius:12px;
}
.radar-detail .rd-def{
  font-size:var(--fs-body);
  color:var(--muted);
  line-height:1.6;
  margin-bottom:20px;
}
.radar-detail .rd-ref{margin-bottom:20px;}
.radar-detail .rd-ref-title{
  font-size:var(--fs-hint);
  color:var(--light);
  font-weight:700;
  margin-bottom:10px;
}
.radar-detail .rd-ref ul{
  list-style:none;
  padding:0;
  margin:0;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
.radar-detail .rd-ref li{
  font-size:var(--fs-hint);
  color:var(--muted);
  background:var(--wash);
  border:1px solid var(--line);
  padding:6px 16px;
  border-radius:14px;
}
.radar-detail .rd-avg{
  font-size:var(--fs-hint);
  color:var(--light);
  margin-bottom:20px;
}
.radar-detail .rd-avg b{color:var(--ink);font-weight:800;}
.radar-detail .rd-why-title{
  font-size:var(--fs-hint);
  color:var(--red);
  font-weight:800;
  margin-bottom:8px;
}
.radar-detail .rd-why{
  font-size:var(--fs-body);
  line-height:1.7;
  color:var(--ink);
}

/* ========== 维度切换按钮 ========== */
.dim-tabs{
  display:flex;
  gap:12px;
  margin-top:32px;
  flex-shrink:0;
}
.dim-tab{
  flex:1;
  height:72px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:var(--fs-body);
  font-weight:900;
  color:var(--muted);
  background:var(--wash);
  border:2px solid var(--line);
  border-radius:var(--radius);
  cursor:pointer;
  transition:all .2s;
}
.dim-tab.active{
  color:var(--red);
  border-color:var(--red);
  background:var(--paper);
}
.dim-tab:hover{color:var(--ink);}
</style>
</head>
<body>

<div class="stage">
  <article class="frame" id="p1"></article>
  <article class="frame" id="p2"></article>
  <article class="frame" id="p3"></article>
  <article class="frame" id="p4"></article>
  <article class="frame" id="p5"></article>
  <article class="frame" id="p6"></article>
</div>

<script>
const D = {
  student:{name:"林同学",grade:"初二",school:"北京市第 X 中学",role:"数龙官",date:"2026-07-08",team:"第 3 分队 · 青龙组"},
  achieve:{
    duration:"5 小时 30 分",
    steps:14523,
    photos:18,
    reflectWords:412
  },
  team:{size:5, tokens:6, finished:"6/6"},
  radar:{
    参与度:92,投入度:88,合作度:85,敏捷度:78,表达力:90
  },
  radarExplain:{
    参与度:{
      def:"围绕任务地点的实际停留与主动操作程度",
      ref:["移动轨迹密度","拍照次数","备忘录/画板/语音工具使用"],
      avg:81, rating:"优秀",
      why:"移动轨迹覆盖太和殿月台东南西北四面；三层月台各拍 2 张以上有效照片；备忘录、画板、语音三种工具均有使用。"
    },
    投入度:{
      def:"任务作答的认真程度与深度",
      ref:["填报内容丰富度","反思文本长度","画板草稿完成度","语音推理时长"],
      avg:76, rating:"优秀",
      why:"「算其数」写了 132 字分层估算方案；反思卷宗共 412 字并附草稿；语音累计 6.4 分钟，全班平均的 1.6 倍。"
    },
    合作度:{
      def:"与同组同伴形成有效协作的程度",
      ref:["轨迹重合度","时间银行借入/借出","共同产出完成度"],
      avg:79, rating:"良好",
      why:"中层计数环节与同伴路径重合 42%；主动向另一组「送」了 3 分钟；小组 6 张令牌全部集齐、合作完成水系图与演讲。"
    },
    敏捷度:{
      def:"在合理范围内又快又好，速度与正确率的乘积",
      ref:["关卡平均用时","估算误差率","任务完成节奏"],
      avg:72, rating:"良好",
      why:"三个关卡平均用时 17.5 分钟，比推荐 20 分钟节约 12.5%；估算误差仅 1.23%（目标 ±3% 内）。"
    },
    表达力:{
      def:"能否把「我怎么想的」讲清楚",
      ref:["反思文本结构","语音表达","课后演讲"],
      avg:74, rating:"优秀",
      why:"独立完成 4 分 12 秒的水系演讲，讲清「螭首→坡度→暗沟→金水河→护城河」水路；反思文本含 3 处「因为…所以…」结构。"
    }
  }
};

const PIN = '<svg width="16" height="16" viewBox="0 0 24 24" fill="var(--red)" stroke="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>';

function frameShell(el, kicker, title, bodyHTML){
  el.innerHTML = `
    <div class="frame-header"><span class="kicker">${kicker}</span></div>
    <h1 class="frame-title">${title}</h1>
    <div class="hero">${bodyHTML}</div>
  `;
}

// ============= P1 · 你的这一天（上） =============
frameShell(document.getElementById('p1'), '成就回顾', '你的这一天', `
  <div class="flow-track" style="margin-bottom:40px;">
    ${[
      {n:1,loc:'沉浸空间',name:'任务领取'},
      {n:2,loc:'故宫',name:'观其形'},
      {n:3,loc:'故宫',name:'算其数'},
      {n:4,loc:'故宫',name:'验其差'},
      {n:5,loc:'沉浸空间',name:'真相推演'}
    ].map((s,i,a)=>`
      <div class="flow-step">
        <div class="flow-num">${s.n}</div>
        <div class="flow-card">
          <div class="flow-loc">${PIN} ${s.loc}</div>
          <div class="flow-name">${s.name}</div>
        </div>
        ${i<a.length-1?'<div class="flow-arrow">→</div>':''}
      </div>
    `).join('')}
  </div>
  <div class="stat-grid">
    ${[
      {icon:'🕐',label:'探索时长',val:D.achieve.duration,unit:''},
      {icon:'🚶',label:'步行步数',val:D.achieve.steps.toLocaleString(),unit:''},
      {icon:'📷',label:'拍摄照片',val:D.achieve.photos,unit:' 张'},
      {icon:'✏️',label:'反思文字',val:D.achieve.reflectWords,unit:' 字'}
    ].map(k=>`
      <div class="stat-card">
        <div class="icon">${k.icon}</div>
        <div class="label">${k.label}</div>
        <div class="val">${k.val}<span class="u">${k.unit}</span></div>
      </div>
    `).join('')}
  </div>
`);

// ============= P2 · 你的这一天（下） =============
frameShell(document.getElementById('p2'), '成就回顾', '你的这一天', `
  <div style="font-size:var(--fs-body);color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:8px;">
    ${PIN} 今日行动路线
  </div>
  <div class="map-box" style="flex:1;min-height:1200px;margin-bottom:32px;">
    <img src="生图素材/route-map.png" alt="故宫研学路线图" style="width:100%;height:100%;object-fit:cover;display:block;">
  </div>
  <div class="team-row" style="margin-bottom:32px;">
    <div class="team-mini">
      <div class="tk">队伍规模</div>
      <div class="tv">${D.team.size}<span style="font-size:var(--fs-hint);font-family:var(--font-body);"> 人</span></div>
    </div>
    <div class="team-mini">
      <div class="tk">身份令牌</div>
      <div class="tv">${D.team.tokens}<span style="font-size:var(--fs-hint);font-family:var(--font-body);">/6</span></div>
    </div>
    <div class="team-mini">
      <div class="tk">全队关卡</div>
      <div class="tv">${D.team.finished}</div>
    </div>
  </div>
  <div class="dark-block">
    <div class="block-label">今日专属徽章 · 「证据自觉」</div>
    <div class="block-hint">在 1 次任务中同时完成：分层方案 + 误差分解 + 3 条以上改进项</div>
  </div>
`);

// ============= P3 · 点亮的学科版图 =============
function skillTreeSVG(){
  var TX=120,y=60,o='';
  var items=[
    {n:'语文',lit:1,tag:'跨学科',b:['逻辑段落写作','口头讲解 4′12″']},
    {n:'英语'},{n:'数学',lit:1,tag:'主学科',main:1,b:['估算与近似','数的运算与量感','数据收集与处理','空间与位置','抽样与推断']},
    {n:'物理'},{n:'化学'},{n:'生物'},
    {n:'科学',lit:1,tag:'跨学科',b:['感官记录与证据链','因势利导 · 物理直觉']},
    {n:'历史'},{n:'地理'},{n:'道德与法治'},
    {n:'美术',lit:1,tag:'跨学科',b:['建筑装饰摄影','螭首 · 云纹 · 栏板']},
    {n:'音乐'},{n:'体育'}
  ];
  items.forEach(function(s){
    s.ny=y;
    if(s.lit&&s.b){s.sy=s.b.map(function(_,i){return y+52+i*48;});y=s.sy[s.sy.length-1]+60;}
    else{y+=64;}
  });
  var H=y+60;
  o+='<defs><filter id="gl" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceGraphic" stdDeviation="5"/></filter></defs>';
  o+='<line x1="'+TX+'" y1="40" x2="'+TX+'" y2="'+(H-30)+'" stroke="var(--line-dark)" stroke-width="2"/>';
  o+='<text x="'+(TX+56)+'" y="36" font-size="28" fill="var(--light)" font-family="var(--font-body)" font-weight="700">初中全学科</text>';
  items.forEach(function(s){
    if(s.lit){
      var r=s.main?16:12,fs=s.main?36:32,vy=s.main?13:11;
      o+='<circle cx="'+TX+'" cy="'+s.ny+'" r="'+(r*3)+'" fill="var(--red)" opacity=".06" filter="url(#gl)"/>';
      o+='<circle cx="'+TX+'" cy="'+s.ny+'" r="'+r+'" fill="var(--red)"/>';
      o+='<line x1="'+(TX+r)+'" y1="'+s.ny+'" x2="'+(TX+42)+'" y2="'+s.ny+'" stroke="var(--red)" stroke-width="'+(s.main?3:2)+'"/>';
      o+='<text x="'+(TX+52)+'" y="'+(s.ny+vy)+'" font-size="'+fs+'" font-weight="900" fill="var(--red)" font-family="var(--font-body)">'+s.n+'</text>';
      var nw=s.n.length*fs*0.9;
      o+='<text x="'+(TX+52+nw+20)+'" y="'+(s.ny+9)+'" font-size="26" fill="var(--muted)" font-family="var(--font-body)">'+s.tag+'</text>';
      if(s.sy){var bx=TX+64;
        o+='<line x1="'+bx+'" y1="'+s.sy[0]+'" x2="'+bx+'" y2="'+s.sy[s.sy.length-1]+'" stroke="var(--red)" stroke-width="1.5" opacity=".2"/>';
        s.sy.forEach(function(sy,i){
          o+='<line x1="'+bx+'" y1="'+sy+'" x2="'+(bx+24)+'" y2="'+sy+'" stroke="var(--red)" stroke-width="1.5" opacity=".35"/>';
          o+='<circle cx="'+(bx+32)+'" cy="'+sy+'" r="4" fill="var(--red)" opacity=".4"/>';
          o+='<text x="'+(bx+48)+'" y="'+(sy+9)+'" font-size="28" fill="var(--ink)" font-family="var(--font-body)">'+s.b[i]+'</text>';
        });
      }
    }else{
      o+='<circle cx="'+TX+'" cy="'+s.ny+'" r="6" fill="none" stroke="var(--line-dark)" stroke-width="1.5"/>';
      o+='<line x1="'+(TX+10)+'" y1="'+s.ny+'" x2="'+(TX+46)+'" y2="'+s.ny+'" stroke="var(--line-dark)" stroke-width="1" stroke-dasharray="4 3"/>';
      o+='<text x="'+(TX+54)+'" y="'+(s.ny+9)+'" font-size="28" fill="var(--light)" font-family="var(--font-body)">'+s.n+'</text>';
    }
  });
  var ly=H-18;
  o+='<circle cx="'+TX+'" cy="'+ly+'" r="7" fill="var(--red)"/>';
  o+='<text x="'+(TX+18)+'" y="'+(ly+8)+'" font-size="26" fill="var(--muted)" font-family="var(--font-body)">本次点亮</text>';
  o+='<circle cx="'+(TX+180)+'" cy="'+ly+'" r="6" fill="none" stroke="var(--line-dark)" stroke-width="1.5"/>';
  o+='<text x="'+(TX+198)+'" y="'+(ly+8)+'" font-size="26" fill="var(--muted)" font-family="var(--font-body)">待点亮</text>';
  return '<svg viewBox="0 0 1400 '+H+'" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%;display:block;">'+o+'</svg>';
}

// ============= P5 · 活动参与过程评价（雷达图） =============
function radarSVG(){
  const keys = Object.keys(D.radar);
  const vals = keys.map(k=>D.radar[k]);
  const cx=300, cy=300, R=220;
  const n=keys.length;
  const angle = (i)=> -Math.PI/2 + (2*Math.PI*i/n);

  const ringLevels = [100,80,60,40,20];
  const rings = ringLevels.map(lv=>{
    const r = R*lv/100;
    const pts = Array.from({length:n}).map((_,i)=>{
      const a=angle(i);
      return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;
    }).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="var(--line)" stroke-width="${lv===100?1.5:0.8}" stroke-dasharray="${lv===100?'none':'4 3'}"/>`;
  }).join('');

  const scaleLabels = [20,40,60,80].map(lv=>{
    const r = R*lv/100;
    return `<text x="${cx+8}" y="${cy-r+5}" font-size="16" fill="var(--light)" font-family="var(--font-body)" opacity="0.7">${lv}</text>`;
  }).join('');

  const axes = keys.map((_,i)=>{
    const a=angle(i);
    return `<line x1="${cx}" y1="${cy}" x2="${cx+R*Math.cos(a)}" y2="${cy+R*Math.sin(a)}" stroke="var(--line)" stroke-width="0.8"/>`;
  }).join('');

  const dataPts = vals.map((v,i)=>{
    const a=angle(i);
    const r=R*v/100;
    return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;
  });
  const dataPoly = `<polygon points="${dataPts.join(' ')}" fill="rgba(140,33,29,.10)" stroke="var(--red)" stroke-width="2.5"/>`;
  const dots = dataPts.map(p=>`<circle cx="${p.split(',')[0]}" cy="${p.split(',')[1]}" r="6" fill="var(--red)"/>`).join('');

  const labels = keys.map((k,i)=>{
    const a=angle(i);
    const lR=R+72;
    const x=cx+lR*Math.cos(a);
    const y=cy+lR*Math.sin(a);
    const v=vals[i];
    return `<g class="radar-vertex" data-k="${k}">
      <text x="${x}" y="${y-14}" text-anchor="middle" font-size="28" fill="var(--muted)" font-family="var(--font-body)" font-weight="600">${k}</text>
      <rect x="${x-30}" y="${y}" rx="14" ry="14" width="60" height="32" fill="var(--red)" opacity="0.9"/>
      <text x="${x}" y="${y+22}" text-anchor="middle" font-size="22" fill="#fff" font-weight="800" font-family="var(--font-body)">${v}</text>
    </g>`;
  }).join('');

  return `<svg viewBox="0 0 600 600" style="width:100%;max-height:960px;display:block;margin:0 auto;">
    ${rings}${scaleLabels}${axes}${dataPoly}${dots}${labels}
  </svg>`;
}

// ============= 交互：P6 维度切换 =============
(function(){
  const $box = document.getElementById('radarDetail');
  const tabs = document.querySelectorAll('#dimTabs .dim-tab');
  let activeK = null;

  function showDim(k){
    if(activeK===k) return;
    activeK = k;
    const info = D.radarExplain[k];
    const v = D.radar[k];
    const diff = v - info.avg;
    const diffStr = diff>0?`高于班均 ${diff} 分`:(diff<0?`低于班均 ${Math.abs(diff)} 分`:'与班均持平');
    tabs.forEach(t=>t.classList.toggle('active', t.dataset.k===k));
    $box.innerHTML = `
      <div class="rd-head">
        <span class="rd-dim">${k}</span>
        <span class="rd-score">${v}</span>
        <span class="rd-rating">${info.rating}</span>
      </div>
      <div class="rd-def">${info.def}</div>
      <div class="rd-ref">
        <div class="rd-ref-title">参考数据</div>
        <ul>${info.ref.map(r=>`<li>${r}</li>`).join('')}</ul>
      </div>
      <div class="rd-avg">班级均分 <b>${info.avg}</b>　${diffStr}</div>
      <div class="rd-why-title">AI 总结</div>
      <div class="rd-why">${info.why}</div>
    `;
  }

  tabs.forEach(t=>t.addEventListener('click',()=>showDim(t.dataset.k)));
  showDim(Object.keys(D.radar)[0]);
})();
