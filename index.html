/* ========== 设计令牌 ========== */
:root{
  --ink:#231a16;
  --muted:#66584f;
  --light:#8a7a6f;
  --paper:#fffdf8;
  --page:#eee7dc;
  --wash:#f7f1e7;
  --line:#ded3c2;
  --line-dark:#c9b9a3;
  --red:#8c211d;
  --red-dark:#611411;
  --blue:#176987;
  --green:#286b54;
  --gold:#b88738;

  --radius:8px;
  --radius-frame:24px;
  --shadow-frame:0 24px 60px rgba(35,26,22,.14);

  --frame-w:940px;
  --frame-h:2016px;

  --font-display:"Songti SC","Noto Serif SC",serif;
  --font-body:"PingFang SC","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
}

/* ========== 全局重置 ========== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:20px;}
body{
  background:var(--page);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:24px;
  line-height:1.8;
  -webkit-font-smoothing:antialiased;
}

/* ========== 舞台 ========== */
.stage{
  display:flex;
  gap:64px;
  padding:72px 64px;
  width:9984px;
  min-height:2160px;
  align-items:center;
}

/* ========== 帧（纸页隐喻） ========== */
.frame{
  width:var(--frame-w);
  height:var(--frame-h);
  flex-shrink:0;
  background:var(--paper);
  border-radius:var(--radius-frame);
  border:1px solid var(--line-dark);
  box-shadow:var(--shadow-frame);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  padding:56px 64px 40px;
}

/* ========== 页眉 ========== */
.frame-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding-bottom:20px;
  border-bottom:3px double var(--line-dark);
  margin-bottom:36px;
  flex-shrink:0;
}
.frame-header .kicker{
  font-size:22px;
  font-weight:900;
  color:var(--red);
  letter-spacing:.2em;
}
.frame-header .page-num{
  font-family:var(--font-display);
  font-size:28px;
  font-weight:900;
  color:var(--light);
}

/* ========== 标题区 ========== */
.frame-title{
  font-family:var(--font-display);
  font-size:64px;
  font-weight:900;
  line-height:1.15;
  color:var(--ink);
  margin-bottom:8px;
}
.frame-subtitle{
  font-size:26px;
  line-height:1.7;
  color:var(--muted);
  margin-bottom:48px;
}

/* ========== 屏1 封面背景 ========== */
#s1{
  background:
    linear-gradient(180deg, rgba(255,253,248,.92) 0%, rgba(255,253,248,.78) 50%, rgba(255,253,248,.95) 100%),
    url("1 素材图/lQLPJwpS1t0RS8fNBIDNCACwCikXJK9D208KEReQoiIMAQ_2048_1152.png") center/cover no-repeat;
}

}

/* ========== 主角区 ========== */
.hero{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
}

/* ========== 配角区 ========== */
.supporting{
  margin-top:40px;
  flex-shrink:0;
}

/* ========== 深色结论块 ========== */
.dark-block{
  background:var(--ink);
  color:var(--paper);
  border-radius:var(--radius);
  padding:32px;
  margin-top:40px;
  flex-shrink:0;
}
.dark-block.red{
  background:var(--red-dark);
}
.dark-block .block-label{
  font-size:22px;
  font-weight:900;
  letter-spacing:.1em;
  color:var(--wash);
  margin-bottom:12px;
}
.dark-block .block-body{
  font-size:24px;
  line-height:1.8;
  color:var(--paper);
}
.dark-block .block-hint{
  font-size:20px;
  color:var(--line);
  margin-top:8px;
  line-height:1.5;
}

/* ========== 页脚 ========== */
.frame-footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding-top:16px;
  border-top:1px solid var(--line);
  margin-top:auto;
  flex-shrink:0;
  font-size:20px;
  color:var(--light);
  font-weight:700;
}

/* ========== 卡片 ========== */
.card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:32px;
}
.card.wash{
  background:var(--wash);
}

/* ========== KPI 卡 ========== */
.kpi{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:28px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.kpi .k{
  font-size:20px;
  color:var(--light);
  font-weight:700;
}
.kpi .v{
  font-family:var(--font-display);
  font-size:64px;
  font-weight:900;
  line-height:1;
  color:var(--ink);
}
.kpi .v.hero-num{
  font-size:120px;
}
.kpi .v .u{
  font-size:24px;
  font-family:var(--font-body);
  font-weight:700;
  color:var(--muted);
  margin-left:4px;
}
.kpi .hint{
  font-size:20px;
  color:var(--muted);
  line-height:1.5;
}
.kpi .v.red-num{
  color:var(--red);
}

/* ========== Badge ========== */
.badge{
  display:inline-flex;
  align-items:center;
  height:34px;
  padding:0 14px;
  border:1px solid var(--line-dark);
  border-radius:var(--radius);
  font-size:20px;
  font-weight:700;
  color:var(--ink);
  background:var(--paper);
  white-space:nowrap;
}
.badge.red{
  border-color:var(--red);
  color:var(--red);
}
.badge.blue{
  border-color:var(--blue);
  color:var(--blue);
}
.badge.green{
  border-color:var(--green);
  color:var(--green);
}

/* ========== 印章 ========== */
.seal{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:2px solid var(--red);
  border-radius:var(--radius);
  color:var(--red);
  font-family:var(--font-display);
  font-size:22px;
  font-weight:900;
  padding:8px 14px;
  background:var(--paper);
  transform:rotate(-3deg);
  white-space:nowrap;
  flex-shrink:0;
}

/* ========== Tab ========== */
.tabs{
  display:flex;
  gap:0;
  border-bottom:2px solid var(--line);
  margin-bottom:32px;
  flex-shrink:0;
}
.tab{
  height:72px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 32px;
  font-size:24px;
  font-weight:900;
  color:var(--muted);
  cursor:pointer;
  border-bottom:3px solid transparent;
  margin-bottom:-2px;
  transition:color .2s,border-color .2s;
}
.tab.active{
  color:var(--red);
  border-bottom-color:var(--red);
}
.tab:hover{
  color:var(--ink);
}

/* ========== 进度条 ========== */
.bar{
  height:14px;
  background:#e5d9c8;
  border-radius:999px;
  overflow:hidden;
}
.bar i{
  display:block;
  height:100%;
  background:var(--red);
  border-radius:999px;
}

/* ========== 令牌 ========== */
.token{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:72px;
  height:90px;
  border:1.5px solid var(--red);
  border-radius:var(--radius);
  font-family:var(--font-display);
  font-size:40px;
  font-weight:900;
  color:var(--red);
  background:var(--paper);
}

/* ========== 五维方印 ========== */
.stamp{
  width:48px;
  height:48px;
  border:1.5px solid var(--red);
  border-radius:var(--radius);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-family:var(--font-display);
  font-size:28px;
  font-weight:900;
  color:var(--red);
  background:var(--paper);
  flex-shrink:0;
}

/* ========== 地图/SVG 容器 ========== */
.map-box{
  background:#fffdf3;
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
}
.map-box svg{
  display:block;
  width:100%;
  height:100%;
}

/* ========== 照片网格 ========== */
.photo-grid{
  display:grid;
  gap:12px;
}
.photo-grid .ph{
  position:relative;
  overflow:hidden;
  border-radius:var(--radius);
  background:var(--wash);
}
.photo-grid .ph img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.photo-grid .cap{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:8px 12px;
  background:rgba(35,26,22,.65);
  color:var(--paper);
  font-size:20px;
  font-weight:700;
}

/* ========== 生图占位框 ========== */
.img-slot{
  position:relative;
  background:var(--wash);
  border:1px dashed var(--line-dark);
  border-radius:var(--radius);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}
.img-slot .slot-label{
  font-size:20px;
  color:var(--muted);
  text-align:center;
  line-height:1.5;
  padding:20px;
}
.img-slot img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

  padding:28px 32px;

}
.radar-detail .rd-avg{
  font-size:20px;color:var(--light);margin-bottom:14px;
}
.radar-detail .rd-avg b{color:var(--ink);font-weight:800;}
.radar-detail .rd-why-title{
  font-size:20px;color:var(--red);font-weight:800;margin-bottom:6px;
}
.radar-detail .rd-why{
  font-size:22px;line-height:1.7;color:var(--ink);
}

.ai-summary{list-style:none;padding:0;margin:0;}
.ai-summary li{
  position:relative;padding-left:20px;
  font-size:22px;line-height:1.8;color:var(--muted);
}
.ai-summary li::before{
  content:"•";position:absolute;left:0;color:var(--red);font-weight:900;
}
/* ========== 语音回放按钮 ========== */
.audio-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--wash);border:1.5px solid var(--line);
  padding:8px 18px;border-radius:20px;cursor:pointer;

.audio-btn:hover{border-color:var(--red);color:var(--red);}
.audio-btn svg{width:18px;height:18px;}
/* ========== 演讲评分条 ========== */
.speech-scores{display:flex;flex-wrap:wrap;gap:12px;margin:16px 0;}
.speech-score-item{

}
.suzhi-card .sc-hint{

  line-height:1.6;
  color:var(--muted);

/* ========== 辅助 ========== */
.divider{

  background:var(--line);
  margin:16px 0;

.flex-col{display:flex;flex-direction:column;}
.gap-24{gap:24px;}
.gap-40{gap:40px;}
.mt-40{margin-top:40px;}
.mt-48{margin-top:48px;}

/* ========== 响应式：不做，固定 9984px ========== */

  items.forEach(function(s){
    s.ny=y;
    if(s.lit&&s.b){s.sy=s.b.map(function(_,i){return y+44+i*40;});y=s.sy[s.sy.length-1]+50;}

  var H=y+50;

  o+='<text x="'+(TX+44)+'" y="28" font-size="20" fill="var(--light)" font-family="var(--font-body)" font-weight="700">初中全学科</text>';

    if(s.lit){

        s.sy.forEach(function(sy,i){
          o+='<line x1="'+bx+'" y1="'+sy+'" x2="'+(bx+20)+'" y2="'+sy+'" stroke="var(--red)" stroke-width="1.5" opacity=".35"/>';

        });
      }
    }else{
      o+='<circle cx="'+TX+'" cy="'+s.ny+'" r="5" fill="none" stroke="var(--line-dark)" stroke-width="1.5"/>';
      o+='<line x1="'+(TX+8)+'" y1="'+s.ny+'" x2="'+(TX+38)+'" y2="'+s.ny+'" stroke="var(--line-dark)" stroke-width="1" stroke-dasharray="4 3"/>';
      o+='<text x="'+(TX+46)+'" y="'+(s.ny+7)+'" font-size="22" fill="var(--light)" font-family="var(--font-body)">'+s.n+'</text>';
    }
  });

  return '<svg viewBox="0 0 812 '+H+'" preserveAspectRatio="xMidYMid meet" style="width:100%;height:100%;display:block;">'+o+'</svg>';
}

// ============= 屏 6：活动参与过程评价 · 雷达图 =============
function radarSVG(){
  const keys = Object.keys(D.radar);
  const vals = keys.map(k=>D.radar[k]);
  const cx=220, cy=240, R=150;
  const n=keys.length;
  const angle = (i)=> -Math.PI/2 + (2*Math.PI*i/n);

  // concentric rings with scale labels
  const ringLevels = [100,80,60,40,20];
  const rings = ringLevels.map(lv=>{
    const r = R*lv/100;
    const pts = Array.from({length:n}).map((_,i)=>{
      const a=angle(i);
      return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;
    }).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="var(--line)" stroke-width="${lv===100?1.5:0.8}" stroke-dasharray="${lv===100?'none':'4 3'}"/>`;
  }).join('');

  // scale labels on first axis
  const scaleLabels = [20,40,60,80].map(lv=>{
    const r = R*lv/100;
    const y = cy - r;
    return `<text x="${cx+6}" y="${y+4}" font-size="11" fill="var(--light)" font-family="var(--font-body)" opacity="0.7">${lv}</text>`;
  }).join('');

  const axes = keys.map((_,i)=>{
    const a=angle(i);
    return `<line x1="${cx}" y1="${cy}" x2="${cx+R*Math.cos(a)}" y2="${cy+R*Math.sin(a)}" stroke="var(--line)" stroke-width="0.8"/>`;
  }).join('');

  const dataPts = vals.map((v,i)=>{
    const a=angle(i);
    const r=R*v/100;
    return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;
  });
  const dataPoly = `<polygon points="${dataPts.join(' ')}" fill="rgba(140,33,29,.10)" stroke="var(--red)" stroke-width="2"/>`;
  const dots = dataPts.map(p=>`<circle cx="${p.split(',')[0]}" cy="${p.split(',')[1]}" r="4" fill="var(--red)"/>`).join('');

  // lightweight labels + score capsules at vertices
  const labels = keys.map((k,i)=>{
    const a=angle(i);
    const lR=R+55;
    const x=cx+lR*Math.cos(a);
    const y=cy+lR*Math.sin(a);
    const v=vals[i];
    // capsule: label + score pill
    return `<g class="radar-vertex" data-k="${k}" style="cursor:pointer">
      <text x="${x}" y="${y-10}" text-anchor="middle" font-size="18" fill="var(--muted)" font-family="var(--font-body)" font-weight="600">${k}</text>
      <rect x="${x-22}" y="${y}" rx="12" ry="12" width="44" height="24" fill="var(--red)" opacity="0.9"/>
      <text x="${x}" y="${y+17}" text-anchor="middle" font-size="15" fill="#fff" font-weight="800" font-family="var(--font-body)">${v}</text>
    </g>`;
  }).join('');

  return `<svg viewBox="0 0 440 440" style="width:100%;max-height:720px;display:block;margin:0 auto;">
    ${rings}${scaleLabels}${axes}${dataPoly}${dots}${labels}
  </svg>`;
}

      <div class="rd-ref">
        <div class="rd-ref-title">参考数据</div>
        <ul>${info.ref.map(r=>`<li>${r}</li>`).join('')}</ul>
      </div>
      <div class="rd-avg">班级均分 <b>${info.avg}</b>　${diffStr}</div>
      <div class="rd-why-title">AI 总结</div>
      <div class="rd-why">${info.why}</div>
    `;
    // highlight active vertex
    vertices.forEach(el=>{
      const rect = el.querySelector('rect');
      if(el.dataset.k===k){
        rect.setAttribute('opacity','1');
        rect.setAttribute('fill','#b5342f');
      } else {
        rect.setAttribute('opacity','0.9');
        rect.setAttribute('fill','var(--red)');
      }
    });
  }

  vertices.forEach(el=>{
    el.addEventListener('click',()=>showDim(el.dataset.k));
    el.addEventListener('mouseenter',()=>showDim(el.dataset.k));
  });

  // auto-show first dimension
  const firstKey = Object.keys(D.radar)[0];
  showDim(firstKey);
})();
</script>

</body>
</html>
