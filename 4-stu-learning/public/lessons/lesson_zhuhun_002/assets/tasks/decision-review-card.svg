<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520">
  <rect width="720" height="520" rx="22" fill="#f1e6d2"/>
  <rect x="38" y="34" width="644" height="452" rx="18" fill="#fffaf0" stroke="#8d211f" stroke-width="3"/>
  <g font-family="PingFang SC, Microsoft YaHei, sans-serif" fill="#4d4437">
    <text x="68" y="78" font-size="25" font-weight="700" fill="#8d211f">新增课程复核卡</text>
    <text x="68" y="104" font-size="13" fill="#756852">课程推演材料｜用于练习“新信息—判断变化—责任安排”，不得作为历史原件引用</text>
    <rect x="68" y="132" width="584" height="76" rx="12" fill="#f4e5e2"/>
    <text x="88" y="162" font-size="17" font-weight="700">信息 A｜来源发生冲突</text>
    <text x="88" y="190" font-size="14">一条关键判断出现了相互矛盾的新来源，原可靠度需要重新评估。</text>
    <rect x="68" y="222" width="584" height="76" rx="12" fill="#efe9dc"/>
    <text x="88" y="252" font-size="17" font-weight="700">信息 B｜窗口与代价变化</text>
    <text x="88" y="280" font-size="14">原方案失败代价上升，可调整时间缩短；继续行动需要明确退出条件。</text>
    <rect x="68" y="312" width="584" height="76" rx="12" fill="#e8efe7"/>
    <text x="88" y="342" font-size="17" font-weight="700">信息 C｜复核触发</text>
    <text x="88" y="370" font-size="14">一条少数意见同时给出来源与核验办法，达到小组预先约定的重议条件。</text>
    <text x="68" y="430" font-size="15" font-weight="700" fill="#8d211f">复盘提示</text>
    <text x="68" y="458" font-size="14">哪条新信息改变了原判断？哪些内容保留、修改或放弃？由谁复核并统一行动？</text>
  </g>
</svg>
